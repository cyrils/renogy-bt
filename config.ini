
# Multi-device configuration
# You can define multiple devices by creating sections named [device.NAME]
# where NAME can be any identifier (e.g., controller, battery, inverter)
# To disable a device, set enabled = false

[device.controller]
enabled = true
adapter = hci0
mac_addr = c4:64:e3:2d:48:89 # <-- must update
alias = BT-TH-E32D4889 # <-- must update
type = RNG_CTRL
# RNG_CTRL => Charge Controller (Rover/Wanderer/Adventurer)
# RNG_CTRL_HIST => Charge Controller historical data
device_id = 255 # modify if hub mode or daisy chain (see readme)

[device.battery]
enabled = true
adapter = hci0
mac_addr = 60:98:66:ee:b4:4c # <-- must update
alias = BT-TH-66EEB44C # <-- must update
type = RNG_BATT
# RNG_BATT => Smart Battery
device_id = 255 # modify if hub mode or daisy chain (see readme)

[data]
enable_polling = true # periodically read data
poll_interval = 60 # read data interval (seconds)
temperature_unit = F # F = Fahrenheit, C = Celsius
fields = # fields to log (comma separated), leave empty for all fields

[remote_logging]
enabled = false
url = https://example.com/post.php
auth_header = auth_header # optional HTTP header sent as "Authorization: Bearer <AUTH_HEADER>"

[mqtt]
enabled = false
server = 192.168.0.16
port = 1883
topic = solar/state
user =
password =

[pvoutput]
# free accounts has a cap of max one request per minute.
enabled = false
api_key =
system_id =
