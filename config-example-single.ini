# Example: Single device configuration for initial setup
# Use this to discover your device MAC addresses

[device.controller]
enabled = true
adapter = hci0
mac_addr = 80:6f:b0:0f:00:00  # Placeholder - the script will show nearby devices
alias = BT-TH-XXXXXX
type = RNG_CTRL
device_id = 255

[data]
enable_polling = false
poll_interval = 60
temperature_unit = F
fields =

[remote_logging]
enabled = false
url = https://example.com/post.php
auth_header = auth_header

[mqtt]
enabled = false
server = 192.168.0.16
port = 1883
topic = solar/state
user =
password =

[pvoutput]
enabled = false
api_key =
system_id =
